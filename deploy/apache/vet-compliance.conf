<VirtualHost *:443>
    ServerName vet-compliance.local

    SSLEngine on
    SSLCertificateFile /etc/ssl/vet-compliance/vet-compliance.crt
    SSLCertificateKeyFile /etc/ssl/vet-compliance/vet-compliance.key

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/
</VirtualHost>

