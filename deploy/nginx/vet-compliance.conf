server {
    listen 443 ssl;
    server_name vet-compliance.local;

    ssl_certificate /etc/ssl/vet-compliance/vet-compliance.crt;
    ssl_certificate_key /etc/ssl/vet-compliance/vet-compliance.key;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

