# Example Apache reverse proxy for Grafana.
# Replace radius.example.com and certificate paths before use.
#
# Required modules:
#   a2enmod proxy proxy_http proxy_wstunnel headers ssl rewrite

<VirtualHost *:80>
    ServerName radius.example.com
    RewriteEngine On
    RewriteRule ^/(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName radius.example.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/radius.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/radius.example.com/privkey.pem

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass /api/live/ ws://127.0.0.1:3000/api/live/
    ProxyPassReverse /api/live/ ws://127.0.0.1:3000/api/live/

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/radius-grafana-error.log
    CustomLog ${APACHE_LOG_DIR}/radius-grafana-access.log combined
</VirtualHost>
</IfModule>
