unifi:
  controllers:
    - name: controller-a
      base_url: https://192.0.2.10:8443
  request_timeout_seconds: 20
  verify_tls: false

secrets:
  # This file must be encrypted with ansible-vault in production.
  vault_file: secrets/secrets.vault

sites:
  # This file must be encrypted with ansible-vault in production.
  vault_file: secrets/sites.vault

ssh:
  username: itvsadmin
  port: 22
  connect_timeout_seconds: 15
  command_timeout_seconds: 60
  host_key_checking: false

ansible:
  forks: 50

scheduler:
  timezone: America/Toronto
  run_on_start: true
  daily_at: "03:00"

metrics:
  listen_port: 9108
  output_dir: data
